services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: ${DB_USER:-todo_app}
      DB_PASSWORD: ${DB_PASSWORD:-todo_app_password}
      DB_NAME: ${DB_NAME:-todo_app}
      DB_CONNECTION_LIMIT: ${DB_CONNECTION_LIMIT:-10}
      JWT_SECRET: ${JWT_SECRET:-development-only-change-this-jwt-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(response => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    stop_grace_period: 15s

  database:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-todo_app}
      MYSQL_USER: ${DB_USER:-todo_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-todo_app_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - 'mysqladmin ping -h 127.0.0.1 -uroot -p"$${MYSQL_ROOT_PASSWORD}" --silent'
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    stop_grace_period: 30s

volumes:
  mysql_data:
